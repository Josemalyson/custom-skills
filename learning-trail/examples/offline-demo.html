<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f6f7f9" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#10131a" media="(prefers-color-scheme: dark)">
  <title>Learning Trail - Trilha de Exemplo</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --panel-raised: #ffffff;
      --panel-soft: #eef2f5;
      --text: #172033;
      --muted: #5d687a;
      --faint: #8792a3;
      --border: #d9e0e8;
      --primary: #3157d5;
      --primary-soft: #e8edff;
      --primary-text: #2440a4;
      --ok: #0f8a6a;
      --ok-soft: #dff7ee;
      --warn: #a56413;
      --warn-soft: #fff2d6;
      --danger: #c93434;
      --danger-soft: #fde8e8;
      --boss-bg: #fff7ed;
      --boss-panel: #ffffff;
      --boss-border: #fed7aa;
      --boss-text: #2f2417;
      --boss-muted: #7c5b36;
      --radius: 14px;
      --radius-sm: 10px;
      --shadow: 0 18px 45px rgba(23, 32, 51, 0.09);
      --shadow-soft: 0 8px 22px rgba(23, 32, 51, 0.06);
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html.dark {
      color-scheme: dark;
      --bg: #10131a;
      --panel: #181d27;
      --panel-raised: #1f2633;
      --panel-soft: #242c3a;
      --text: #eef2f8;
      --muted: #a8b2c1;
      --faint: #737f91;
      --border: #343d4e;
      --primary: #8aa2ff;
      --primary-soft: #27304d;
      --primary-text: #d8e0ff;
      --ok: #5ed0a9;
      --ok-soft: #183d34;
      --warn: #e8b657;
      --warn-soft: #443116;
      --danger: #ff8a8a;
      --danger-soft: #472123;
      --boss-bg: #1a202c;
      --boss-panel: #222a38;
      --boss-border: #394255;
      --boss-text: #f8fafc;
      --boss-muted: #aeb8c8;
      --shadow: 0 14px 32px rgba(0, 0, 0, 0.22);
      --shadow-soft: 0 10px 24px rgba(0, 0, 0, 0.18);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--panel-soft) 48%, var(--bg)) 0, var(--bg) 22rem);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.65;
    }

    a { color: inherit; }
    button, input { font: inherit; }
    button { cursor: pointer; }

    .skip-link {
      position: absolute;
      left: 1rem;
      top: -4rem;
      z-index: 50;
      padding: .55rem .8rem;
      border-radius: 0 0 var(--radius) var(--radius);
      background: var(--primary);
      color: white;
      font-weight: 700;
      text-decoration: none;
    }
    .skip-link:focus { top: 0; }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 18rem minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      border-right: 1px solid var(--border);
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      backdrop-filter: blur(16px);
      padding: 1.5rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 1.5rem;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 2.25rem;
      height: 2.25rem;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), color-mix(in srgb, var(--primary) 72%, var(--ok)));
      color: white;
      font-weight: 800;
      box-shadow: var(--shadow-soft);
    }

    .brand-title {
      margin: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: .95rem;
      line-height: 1.2;
    }

    .brand-subtitle {
      margin: .15rem 0 0;
      color: var(--muted);
      font-size: .74rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
      min-height: 3.5rem;
      padding: .65rem 1rem;
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      backdrop-filter: blur(12px);
    }

    .topbar-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 800;
    }

    .icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
      min-width: 2.25rem;
      min-height: 2.25rem;
      padding: .45rem .7rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--panel-raised);
      color: var(--text);
      box-shadow: var(--shadow-soft);
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }
    .icon-button:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--primary) 45%, var(--border));
      background: color-mix(in srgb, var(--primary-soft) 42%, var(--panel-raised));
    }

    .icon {
      display: inline-block;
      flex: 0 0 auto;
      width: 1em;
      height: 1em;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      vertical-align: -.14em;
    }

    .badges, .actions {
      display: flex;
      flex-wrap: wrap;
      gap: .6rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      padding: .32rem .62rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: color-mix(in srgb, var(--panel-soft) 74%, var(--panel-raised));
      color: var(--muted);
      font-size: .76rem;
      font-weight: 700;
    }
    .badge.primary {
      border-color: color-mix(in srgb, var(--primary) 35%, var(--border));
      background: var(--primary-soft);
      color: var(--primary-text);
    }
    .badge.ok {
      border-color: color-mix(in srgb, var(--ok) 35%, var(--border));
      background: var(--ok-soft);
      color: var(--ok);
    }

    .progress-box {
      margin: 1.25rem 0 1.6rem;
      padding: 1rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: color-mix(in srgb, var(--panel-soft) 76%, var(--panel-raised));
      box-shadow: var(--shadow-soft);
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      gap: .75rem;
      margin-bottom: .65rem;
      color: var(--muted);
      font-size: .78rem;
      font-weight: 700;
    }

    .progress-track {
      height: .45rem;
      overflow: hidden;
      border-radius: 999px;
      background: color-mix(in srgb, var(--border) 72%, var(--panel));
    }

    .progress-fill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: var(--ok);
      transition: width .2s ease;
    }

    .nav-title {
      margin: 1.4rem 0 .75rem;
      color: var(--faint);
      font-size: .72rem;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .station-nav {
      display: grid;
      gap: .45rem;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .nav-link {
      display: grid;
      grid-template-columns: 1.35rem minmax(0, 1fr);
      gap: .7rem;
      padding: .72rem;
      border: 1px solid transparent;
      border-radius: 12px;
      color: var(--muted);
      text-decoration: none;
    }
    .nav-link:hover, .nav-link[aria-current="true"] {
      border-color: color-mix(in srgb, var(--primary) 35%, var(--border));
      background: var(--primary-soft);
      color: var(--primary-text);
    }
    .nav-number {
      display: grid;
      place-items: center;
      width: 1.35rem;
      height: 1.35rem;
      border-radius: 999px;
      background: color-mix(in srgb, var(--panel-soft) 78%, var(--panel));
      font-size: .75rem;
      font-weight: 800;
    }
    .nav-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: .86rem;
      font-weight: 700;
    }

    .main {
      min-width: 0;
    }

    .content {
      width: min(100%, 52rem);
      margin: 0 auto;
      padding: 4.25rem 1.6rem 5rem;
    }

    .hero {
      margin-bottom: 3rem;
    }
    .hero h1 {
      margin: 1.15rem 0 1rem;
      font-size: clamp(2rem, 5vw, 3.8rem);
      line-height: 1.05;
      letter-spacing: 0;
      max-width: 46rem;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 1.08rem;
      max-width: 44rem;
    }

    .panel, .station, .resource-card, .note {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel-raised);
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 1.35rem;
      margin: 1.6rem 0;
    }
    .panel-title {
      margin: 0 0 .8rem;
      color: var(--faint);
      font-size: .75rem;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .station {
      margin: 2rem 0;
      padding: 1.5rem;
      scroll-margin-top: 5rem;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    }
    .station:hover {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--primary) 22%, var(--border));
      box-shadow: var(--shadow);
    }
    .station-header {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: .85rem;
    }
    .station-number {
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      width: 2rem;
      height: 2rem;
      border-radius: 999px;
      background: color-mix(in srgb, var(--primary) 88%, var(--ok));
      color: white;
      font-weight: 800;
    }
    .station h2 {
      margin: 0;
      font-size: 1.42rem;
      line-height: 1.2;
    }
    .station-meta {
      display: flex;
      flex-wrap: wrap;
      gap: .65rem;
      margin: .75rem 0 1.35rem;
      color: var(--muted);
      font-size: .84rem;
      font-weight: 700;
    }
    .narrative p {
      margin: .95rem 0;
      color: color-mix(in srgb, var(--text) 86%, var(--muted));
    }

    .note {
      padding: 1.05rem;
      margin: 1.25rem 0;
      box-shadow: none;
      background: color-mix(in srgb, var(--panel-soft) 80%, var(--panel-raised));
    }
    .note.practice {
      border-color: color-mix(in srgb, var(--primary) 35%, var(--border));
      background: var(--primary-soft);
    }
    .note.check {
      border-color: color-mix(in srgb, var(--warn) 40%, var(--border));
      background: var(--warn-soft);
    }
    .note strong {
      display: block;
      margin-bottom: .45rem;
      font-size: .78rem;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .resource-list {
      display: grid;
      gap: 1rem;
      margin: 1.25rem 0;
    }
    .resource-card {
      padding: 1rem;
      box-shadow: var(--shadow-soft);
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }
    .resource-card:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--primary) 26%, var(--border));
      background: color-mix(in srgb, var(--panel-raised) 86%, var(--primary-soft));
    }
    .resource-head {
      display: grid;
      grid-template-columns: 2.25rem minmax(0, 1fr);
      gap: 1rem;
      align-items: start;
    }
    .resource-icon {
      display: grid;
      place-items: center;
      width: 2.25rem;
      height: 2.25rem;
      border-radius: 12px;
      background: var(--primary-soft);
      color: var(--primary);
    }
    .resource-icon .icon {
      width: 1.15rem;
      height: 1.15rem;
    }
    .resource-card a {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      color: var(--text);
      font-weight: 800;
      text-decoration: none;
      line-height: 1.3;
    }
    .resource-card a:hover { color: var(--primary); }
    .resource-meta, .resource-evidence {
      margin: .45rem 0 0;
      color: var(--muted);
      font-size: .85rem;
    }
    .resource-evidence {
      padding-left: .8rem;
      margin-top: .75rem;
      border-left: 3px solid var(--primary);
      font-style: italic;
    }

    .station-progress {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-top: 1.35rem;
      padding: .95rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--panel-soft) 76%, var(--panel-raised));
    }
    .station-progress label {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-weight: 800;
    }
    .status-pill {
      margin-left: auto;
      padding: .18rem .45rem;
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      font-size: .76rem;
      font-weight: 800;
      white-space: nowrap;
    }
    .status-pill.completed {
      background: var(--ok-soft);
      color: var(--ok);
    }

    .boss {
      margin: 2.5rem 0;
      padding: 1.5rem;
      border-radius: var(--radius);
      border: 1px solid var(--boss-border);
      background: var(--boss-bg);
      color: var(--boss-text);
      box-shadow: var(--shadow);
    }
    .boss h2 { margin: 0 0 .4rem; }
    .boss p { color: var(--boss-muted); }
    .boss li {
      margin: .9rem 0;
      padding: 1rem;
      border: 1px solid var(--boss-border);
      border-radius: var(--radius);
      background: var(--boss-panel);
      box-shadow: var(--shadow-soft);
    }

    details {
      margin: 1.6rem 0;
    }
    summary {
      cursor: pointer;
      padding: 1rem 1.2rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel-raised);
      font-weight: 800;
      box-shadow: var(--shadow-soft);
    }
    details[open] summary {
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .details-body {
      padding: 1.25rem;
      border: 1px solid var(--border);
      border-top: 0;
      border-radius: 0 0 var(--radius) var(--radius);
      background: var(--panel);
    }

    .inventory-list {
      display: grid;
      gap: .75rem;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .inventory-item {
      display: grid;
      grid-template-columns: 2rem minmax(0, 1fr);
      gap: .85rem;
      padding: .9rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--panel-soft) 82%, var(--panel-raised));
      box-shadow: var(--shadow-soft);
    }

    .inventory-icon {
      display: grid;
      place-items: center;
      width: 2rem;
      height: 2rem;
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--primary);
    }

    .inventory-main {
      min-width: 0;
      display: grid;
      gap: .45rem;
    }

    .inventory-title-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: .5rem;
    }

    .inventory-title {
      min-width: min(100%, 14rem);
      color: var(--text);
      font-weight: 800;
      line-height: 1.3;
      text-decoration: none;
    }
    .inventory-title:hover { color: var(--primary); }

    .inventory-status {
      padding: .16rem .42rem;
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      font-size: .72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .inventory-status.approved {
      background: var(--ok-soft);
      color: var(--ok);
    }
    .inventory-status.rejected {
      background: var(--danger-soft);
      color: var(--danger);
    }
    .inventory-status.backup {
      background: var(--warn-soft);
      color: var(--warn);
    }

    .inventory-meta, .inventory-reason {
      margin: 0;
      color: var(--muted);
      font-size: .84rem;
    }

    .inventory-reason {
      color: color-mix(in srgb, var(--text) 72%, var(--muted));
    }

    .empty, .error {
      padding: 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--muted);
    }
    .error {
      border-color: color-mix(in srgb, var(--danger) 45%, var(--border));
      color: var(--danger);
    }

    .mobile-overlay {
      display: none;
    }

    @media (max-width: 820px) {
      .app-shell {
        display: block;
      }
      .topbar {
        display: flex;
      }
      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        z-index: 40;
        width: min(18rem, 86vw);
        transform: translateX(-105%);
        transition: transform .18s ease;
        box-shadow: var(--shadow);
      }
      body.nav-open .sidebar {
        transform: translateX(0);
      }
      .mobile-overlay {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: none;
        background: rgba(15, 23, 42, .55);
      }
      body.nav-open .mobile-overlay {
        display: block;
      }
      .content {
        padding: 1.75rem 1rem 3rem;
      }
      .hero {
        margin-bottom: 2rem;
      }
      .station {
        margin: 1.35rem 0;
        padding: 1.05rem;
      }
      .station h2 {
        font-size: 1.22rem;
      }
      .resource-head {
        grid-template-columns: 2rem minmax(0, 1fr);
        gap: .8rem;
      }
      .resource-card {
        padding: .95rem;
      }
      .inventory-item {
        grid-template-columns: 1fr;
      }
      .inventory-icon {
        display: none;
      }
      .station-progress {
        align-items: flex-start;
        flex-direction: column;
      }
      .status-pill {
        margin-left: 0;
      }
    }
  </style>
</head>

  <div class="app-shell">

      <div class="brand">

  </div>

        package: '<path d="m21 8-9-5-9 5 9 5 9-5z"></path><path d="M3 8v8l9 5 9-5V8"></path><path d="M12 13v8"></path>',
        article: '<path d="M6 3h9l3 3v15H6z"></path><path d="M14 3v4h4"></path><path d="M8 11h8"></path><path d="M8 15h8"></path><path d="M8 19h5"></path>',
        video: '<rect x="3" y="5" width="14" height="14" rx="2"></rect><path d="m17 9 4-2v10l-4-2"></path>',
        audio: '<path d="M4 13a8 8 0 0 1 16 0"></path><path d="M4 13v3a2 2 0 0 0 2 2h1v-7H6a2 2 0 0 0-2 2z"></path><path d="M20 13v3a2 2 0 0 1-2 2h-1v-7h1a2 2 0 0 1 2 2z"></path>',
        lab: '<path d="M9 3v5l-5 9a3 3 0 0 0 2.6 4h10.8A3 3 0 0 0 20 17l-5-9V3"></path><path d="M8 3h8"></path><path d="M7 14h10"></path>',
        community: '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.9"></path><path d="M16 3.1a4 4 0 0 1 0 7.8"></path>',
        book: '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z"></path>',
        external: '<path d="M7 17 17 7"></path><path d="M8 7h9v9"></path>',
        trash: '<path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path>'
      };

      if (!data) {
        showError("Nao foi possivel carregar o JSON embutido em #trail-data.");
        return;
      }

      normalizeData(data);
      applyTheme(state.theme);
      renderAll();
      bindChrome();

      function loadData() {
        var el = document.getElementById("trail-data");
        if (!el) return null;
        try {
          return JSON.parse(el.textContent.trim());
        } catch (error) {
          return null;
        }
      }

      function normalizeData(trail) {
        trail.meta = trail.meta || {};
        trail.meta.id = trail.meta.id || trail.meta.slug || "learning-trail";
        trail.meta.title = trail.meta.title || "Learning Trail";
        trail.meta.level = trail.meta.level || "";
        trail.meta.created_at = trail.meta.created_at || "";
        trail.summary = trail.summary || {};
        trail.summary.objective = array(trail.summary.objective);
        trail.summary.nerves_validated = trail.summary.nerves_validated || countNerves(trail);
        trail.stations = array(trail.stations);
        trail.resources = array(trail.resources);
        trail.boss_final = array(trail.boss_final);
        trail.additional_resources = array(trail.additional_resources);
        trail.next_steps = array(trail.next_steps);
        trail.audit = trail.audit || {};
        trail.audit.resources_by_modality = trail.audit.resources_by_modality || {};
        trail.stations.forEach(function (station, index) {
          station.id = station.id || "estacao-" + (index + 1);
          station.number = station.number || index + 1;
          station.title = station.title || "Estacao " + (index + 1);
          station.narrative = array(station.narrative);
          station.nerves = array(station.nerves);
          station.reading_minutes = station.reading_minutes || 0;
        });
      }

      function array(value) {
        return Array.isArray(value) ? value : [];
      }

      function countNerves(trail) {
        return array(trail.stations).reduce(function (total, station) {
          return total + array(station.nerves).length;
        }, 0);
      }

      function showError(message) {
        var main = document.getElementById("main-content");
        main.textContent = "";
        var box = document.createElement("div");
        box.className = "error";
        box.textContent = message;
        main.appendChild(box);
      }

      function bindChrome() {
        var openNav = document.getElementById("open-nav");
        var themeToggles = document.querySelectorAll(".theme-toggle");
        var overlays = document.querySelectorAll("[data-close-nav]");
        if (openNav) {
          openNav.addEventListener("click", function () {
            document.body.classList.add("nav-open");
          });
        }
        overlays.forEach(function (el) {
          el.addEventListener("click", closeNav);
        });
        themeToggles.forEach(function (themeToggle) {
          themeToggle.addEventListener("click", function () {
            state.theme = document.documentElement.classList.contains("dark") ? "light" : "dark";
            try { localStorage.setItem("learning-trail-theme", state.theme); } catch (error) {}
            applyTheme(state.theme);
          });
        });
        document.addEventListener("keydown", function (event) {
          if (event.key === "Escape") closeNav();
        });
      }

      function closeNav() {
        document.body.classList.remove("nav-open");
      }

      function getStoredTheme() {
        try {
          var stored = localStorage.getItem("learning-trail-theme");
          if (stored === "light" || stored === "dark") return stored;
        } catch (error) {}
        return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }

      function applyTheme(theme) {
        document.documentElement.classList.toggle("dark", theme === "dark");
        document.querySelectorAll(".theme-toggle").forEach(function (toggle) {
          toggle.textContent = "";
          toggle.appendChild(icon(theme === "dark" ? "sun" : "moon"));
          toggle.appendChild(document.createTextNode(theme === "dark" ? "Claro" : "Escuro"));
        });
      }

      function progressKey(trail) {
        if (trail.progress && trail.progress.storage_key) return trail.progress.storage_key;
        var version = trail.progress && trail.progress.version ? trail.progress.version : 1;
        return "learning-trail:" + trail.meta.id + ":progress:v" + version;
      }

      function loadProgress(trail) {
        if (!trail) return {};
        try {
          var raw = localStorage.getItem(progressKey(trail));
          if (raw) return JSON.parse(raw);
        } catch (error) {}
        return {};
      }

      function saveProgress() {
        try {
          state.progress.updated_at = new Date().toISOString();
          localStorage.setItem(progressKey(data), JSON.stringify(state.progress));
        } catch (error) {}
      }

      function setCompleted(stationId, checked) {
        state.progress[stationId] = checked ? "completed" : "in_progress";
        saveProgress();
        renderProgress();
        renderStationStatus(stationId);
      }

      function completedCount() {
        return data.stations.filter(function (station) {
          return state.progress[station.id] === "completed";
        }).length;
      }

      function renderAll() {
        document.title = "Learning Trail - " + data.meta.title;
        var brand = document.querySelector(".brand-mark");
        if (brand) {
          brand.textContent = "";
          brand.appendChild(icon("compass"));
        }
        var openNav = document.getElementById("open-nav");
        if (openNav) {
          openNav.textContent = "";
          openNav.appendChild(icon("menu"));
          openNav.appendChild(document.createTextNode("Menu"));
        }
        document.querySelectorAll("[data-bind-title]").forEach(function (el) {
          el.textContent = data.meta.title;
        });
        renderBadges();
        renderNav();
        renderMain();
        renderProgress();
      }

      function renderBadges() {
        var box = document.getElementById("sidebar-badges");
        box.textContent = "";
        addBadge(box, data.meta.level || "nivel", "", "target");
        addBadge(box, data.stations.length + " estacoes", "primary", "map");
        addBadge(box, data.summary.nerves_validated + " nervos", "ok", "check");
      }

      function addBadge(parent, label, variant, iconName) {
        var badge = document.createElement("span");
        badge.className = "badge" + (variant ? " " + variant : "");
        if (iconName) badge.appendChild(icon(iconName));
        badge.appendChild(document.createTextNode(label));
        parent.appendChild(badge);
      }

      function renderProgress() {
        var total = data.stations.length;
        var completed = completedCount();
        var pct = total ? Math.round((completed / total) * 100) : 0;
        var box = document.getElementById("progress-summary");
        box.textContent = "";

        var label = document.createElement("div");
        label.className = "progress-label";
        label.appendChild(span("Progresso"));
        label.appendChild(span(completed + " de " + total + " (" + pct + "%)"));

        var track = document.createElement("div");
        track.className = "progress-track";
        var fill = document.createElement("div");
        fill.className = "progress-fill";
        fill.style.width = pct + "%";
        track.appendChild(fill);

        box.appendChild(label);
        box.appendChild(track);
      }

      function renderNav() {
        var nav = document.getElementById("station-nav");
        nav.textContent = "";
        data.stations.forEach(function (station) {
          var li = document.createElement("li");
          var a = document.createElement("a");
          a.className = "nav-link";
          a.href = "#" + station.id;
          a.addEventListener("click", closeNav);
          var number = document.createElement("span");
          number.className = "nav-number";
          number.textContent = station.number;
          var text = document.createElement("span");
          text.className = "nav-text";
          text.textContent = station.title;
          a.appendChild(number);
          a.appendChild(text);
          li.appendChild(a);
          nav.appendChild(li);
        });
      }

      function renderMain() {
        var main = document.getElementById("main-content");
        main.textContent = "";
        main.appendChild(renderHero());
        data.stations.forEach(function (station) {
          main.appendChild(renderStation(station));
        });
        main.appendChild(renderBoss());
        main.appendChild(renderNextSteps());
        main.appendChild(renderAudit());
        main.appendChild(renderInventory());
      }

      function renderHero() {
        var hero = document.createElement("section");
        hero.className = "hero";
        var badges = document.createElement("div");
        badges.className = "badges";
        addBadge(badges, data.meta.level || "nivel", "", "target");
        addBadge(badges, data.stations.length + " estacoes", "primary", "map");
        addBadge(badges, "offline", "ok", "check");
        hero.appendChild(badges);

        var h1 = document.createElement("h1");
        h1.textContent = data.meta.title;
        hero.appendChild(h1);

        var p = document.createElement("p");
        p.textContent = data.summary.objective.join(". ");
        hero.appendChild(p);
        return hero;
      }

      function renderStation(station) {
        var section = document.createElement("section");
        section.className = "station";
        section.id = station.id;

        var header = document.createElement("div");
        header.className = "station-header";
        var number = document.createElement("span");
        number.className = "station-number";
        number.textContent = station.number;
        var title = document.createElement("h2");
        title.textContent = station.title;
        header.appendChild(number);
        header.appendChild(title);
        section.appendChild(header);

        var meta = document.createElement("div");
        meta.className = "station-meta";
        meta.appendChild(icon("clock"));
        meta.appendChild(document.createTextNode(station.reading_minutes + " min leitura"));
        meta.appendChild(document.createTextNode(" | "));
        meta.appendChild(icon("plug"));
        meta.appendChild(document.createTextNode(station.nerves.length + " nervo(s)"));
        section.appendChild(meta);

        var narrative = document.createElement("div");
        narrative.className = "narrative";
        station.narrative.forEach(function (paragraph) {
          var p = document.createElement("p");
          p.textContent = paragraph;
          narrative.appendChild(p);
        });
        section.appendChild(narrative);

        if (station.practice) section.appendChild(renderNote("practice", station.practice.title, station.practice.description));

        var resources = document.createElement("div");
        resources.className = "resource-list";
        station.nerves.forEach(function (nerve) {
          var resource = findResource(nerve.resource_id);
          if (resource) resources.appendChild(renderResource(resource, nerve));
        });
        section.appendChild(resources);

        if (station.advancement_check) section.appendChild(renderNote("check", "Check de avanco", station.advancement_check));
        section.appendChild(renderStationProgress(station));
        return section;
      }

      function renderNote(type, title, description) {
        var note = document.createElement("div");
        note.className = "note " + type;
        var strong = document.createElement("strong");
        strong.appendChild(icon(type === "check" ? "alert" : "wrench"));
        strong.appendChild(document.createTextNode(" " + title));
        var p = document.createElement("p");
        p.textContent = description || "";
        note.appendChild(strong);
        note.appendChild(p);
        return note;
      }

      function renderResource(resource, nerve) {
        var card = document.createElement("article");
        card.className = "resource-card";
        var head = document.createElement("div");
        head.className = "resource-head";
        var iconBox = document.createElement("div");
        iconBox.className = "resource-icon";
        iconBox.appendChild(icon(iconForResource(resource.type)));
        var body = document.createElement("div");
        var a = document.createElement("a");
        a.href = resource.url || "#";
        a.textContent = resource.title || "Recurso";
        if (a.href.indexOf("#") === -1) {
          a.target = "_blank";
          a.rel = "noopener noreferrer";
        }
        var meta = document.createElement("p");
        meta.className = "resource-meta";
        meta.textContent = [resource.type, resource.author, resource.source].filter(Boolean).join(" | ");
        var when = document.createElement("p");
        when.className = "resource-meta";
        when.textContent = "Quando seguir: " + (nerve.when_to_follow || "");
        body.appendChild(a);
        if (resource.url && resource.url !== "#") body.appendChild(icon("external"));
        body.appendChild(meta);
        body.appendChild(when);
        if (nerve.station_validation && nerve.station_validation.evidence) {
          var evidence = document.createElement("p");
          evidence.className = "resource-evidence";
          evidence.textContent = "Validado: " + nerve.station_validation.evidence;
          body.appendChild(evidence);
        }
        head.appendChild(iconBox);
        head.appendChild(body);
        card.appendChild(head);
        return card;
      }

      function renderStationProgress(station) {
        var box = document.createElement("div");
        box.className = "station-progress";
        var label = document.createElement("label");
        var checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = state.progress[station.id] === "completed";
        checkbox.addEventListener("change", function () {
          setCompleted(station.id, checkbox.checked);
        });
        label.appendChild(checkbox);
        label.appendChild(document.createTextNode("Marcar como concluida"));
        var status = document.createElement("span");
        status.id = "status-" + station.id;
        box.appendChild(label);
        box.appendChild(status);
        renderStatusInto(status, station.id);
        return box;
      }

      function renderStationStatus(stationId) {
        var status = document.getElementById("status-" + stationId);
        if (status) renderStatusInto(status, stationId);
      }

      function renderStatusInto(el, stationId) {
        var value = state.progress[stationId] || "not_started";
        el.className = "status-pill" + (value === "completed" ? " completed" : "");
        el.textContent = value === "completed" ? "Concluido" : value === "in_progress" ? "Em andamento" : "Nao iniciado";
      }

      function renderBoss() {
        var section = document.createElement("section");
        section.className = "boss";
        var h2 = document.createElement("h2");
        h2.appendChild(icon("sword"));
        h2.appendChild(document.createTextNode(" Boss Final"));
        var p = document.createElement("p");
        p.textContent = "Sem gabarito. Responda mentalmente ou por escrito.";
        var ol = document.createElement("ol");
        data.boss_final.forEach(function (item) {
          var li = document.createElement("li");
          li.textContent = item.type + ": " + item.question;
          ol.appendChild(li);
        });
        section.appendChild(h2);
        section.appendChild(p);
        section.appendChild(ol);
        return section;
      }

      function renderNextSteps() {
        var section = document.createElement("section");
        section.className = "panel";
        var h2 = document.createElement("h2");
        h2.className = "panel-title";
        h2.appendChild(icon("compass"));
        h2.appendChild(document.createTextNode(" Proximos passos"));
        var ul = document.createElement("ul");
        data.next_steps.forEach(function (step) {
          var li = document.createElement("li");
          li.textContent = step;
          ul.appendChild(li);
        });
        section.appendChild(h2);
        section.appendChild(ul);
        return section;
      }

      function renderAudit() {
        var audit = data.audit || {};
        var modalities = audit.resources_by_modality || {};
        var section = document.createElement("section");
        section.className = "panel";
        var h2 = document.createElement("h2");
        h2.className = "panel-title";
        h2.appendChild(icon("check"));
        h2.appendChild(document.createTextNode(" Auditoria"));
        var p = document.createElement("p");
        p.textContent = "Inspecionados: " + (audit.inspected || 0) +
          " | aprovados: " + (audit.approved || 0) +
          " | reprovados: " + (audit.rejected || 0) +
          " | leituras: " + (modalities.readings || 0) +
          " | labs: " + (modalities.tutorials_labs || 0);
        section.appendChild(h2);
        section.appendChild(p);
        return section;
      }

      function renderInventory() {
        var details = document.createElement("details");
        var summary = document.createElement("summary");
        summary.appendChild(icon("package"));
        summary.appendChild(document.createTextNode(" Inventario completo de recursos (" + data.resources.length + ")"));
        var body = document.createElement("div");
        body.className = "details-body";
        var list = document.createElement("ul");
        list.className = "inventory-list";
        data.resources.forEach(function (resource) {
          list.appendChild(renderInventoryItem(resource));
        });
        body.appendChild(list);
        details.appendChild(summary);
        details.appendChild(body);
        return details;
      }

      function renderInventoryItem(resource) {
        var item = document.createElement("li");
        item.className = "inventory-item";

        var iconBox = document.createElement("div");
        iconBox.className = "inventory-icon";
        iconBox.appendChild(icon(iconForResource(resource.type)));

        var main = document.createElement("div");
        main.className = "inventory-main";

        var titleRow = document.createElement("div");
        titleRow.className = "inventory-title-row";

        var title = document.createElement("a");
        title.className = "inventory-title";
        title.href = resource.url || "#";
        title.textContent = resource.title || "Recurso";
        if (resource.url && resource.url !== "#") {
          title.target = "_blank";
          title.rel = "noopener noreferrer";
        }

        var status = document.createElement("span");
        status.className = "inventory-status " + (resource.status || "");
        status.textContent = statusLabel(resource.status);

        titleRow.appendChild(title);
        titleRow.appendChild(status);

        var meta = document.createElement("p");
        meta.className = "inventory-meta";
        meta.textContent = [typeLabel(resource.type), resource.author, resource.source].filter(Boolean).join(" | ");

        var reason = document.createElement("p");
        reason.className = "inventory-reason";
        reason.textContent = resource.decision_reason || firstEvidence(resource) || "Sem motivo registrado.";

        main.appendChild(titleRow);
        main.appendChild(meta);
        main.appendChild(reason);

        item.appendChild(iconBox);
        item.appendChild(main);
        return item;
      }

      function findResource(id) {
        return data.resources.find(function (resource) {
          return resource.id === id;
        });
      }

      function icon(name) {
        var svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("class", "icon");
        svg.setAttribute("viewBox", "0 0 24 24");
        svg.setAttribute("aria-hidden", "true");
        svg.innerHTML = ICONS[name] || ICONS.article;
        return svg;
      }

      function iconForResource(type) {
        var map = {
          video: "video",
          reading: "article",
          audio: "audio",
          tutorial_lab: "lab",
          recent_community: "community",
          book: "book"
        };
        return map[type] || "article";
      }

      function statusLabel(status) {
        var labels = {
          approved: "aprovado",
          rejected: "reprovado",
          backup: "backup",
          weak_signal: "sinal fraco"
        };
        return labels[status] || status || "sem status";
      }

      function typeLabel(type) {
        var labels = {
          video: "video",
          reading: "leitura",
          audio: "audio",
          tutorial_lab: "tutorial/lab",
          recent_community: "comunidade",
          book: "livro"
        };
        return labels[type] || type || "";
      }

      function firstEvidence(resource) {
        return resource.validation && Array.isArray(resource.validation.evidence)
          ? resource.validation.evidence[0]
          : "";
      }

      function span(text) {
        var el = document.createElement("span");
        el.textContent = text;
        return el;
      }
    })();
  </script>
</body>
</html>
