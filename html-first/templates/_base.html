<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <meta name="description" content="{{DESCRIPTION}}">
  <style>
    :root {
      --bg: #fafaf9;
      --bg-elevated: #ffffff;
      --bg-muted: #f4f4f3;
      --border: #e7e7e5;
      --text: #18181b;
      --text-muted: #6b6b70;
      --text-subtle: #9ca3af;
      --accent: #0f766e;
      --accent-bg: #ccfbf1;
      --accent-text: #134e4a;
      --success: #15803d;
      --warning: #b45309;
      --danger: #b91c1c;
      --info: #1d4ed8;
      --font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      --font-mono: ui-monospace, "JetBrains Mono", "Fira Code", "SF Mono", Menlo, Consolas, monospace;
      --text-xs: 0.75rem; --text-sm: 0.875rem; --text-base: 1rem; --text-lg: 1.125rem;
      --text-xl: 1.25rem; --text-2xl: 1.5rem; --text-3xl: 1.875rem; --text-4xl: 2.25rem;
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
      --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem;
      --space-12: 3rem; --space-16: 4rem;
      --radius-sm: 0.25rem; --radius-md: 0.375rem; --radius-lg: 0.5rem;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-focus: 0 0 0 3px rgba(15, 118, 110, 0.25);
      --transition: 150ms ease-out;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f10;
        --bg-elevated: #18181b;
        --bg-muted: #27272a;
        --border: #2d2d31;
        --text: #fafafa;
        --text-muted: #a1a1aa;
        --text-subtle: #71717a;
        --accent: #5eead4;
        --accent-bg: #134e4a;
        --accent-text: #ccfbf1;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: var(--font-sans); font-size: var(--text-base); line-height: 1.6;
      font-feature-settings: "kern", "liga"; -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, h4 { margin: 0 0 var(--space-4); line-height: 1.25; font-weight: 600; letter-spacing: -0.011em; }
    h1 { font-size: var(--text-4xl); }
    h2 { font-size: var(--text-2xl); margin-top: var(--space-10); }
    h3 { font-size: var(--text-xl); margin-top: var(--space-6); }
    p { margin: 0 0 var(--space-4); }
    a { color: var(--accent); text-decoration: underline; text-underline-offset: 0.2em; }
    a:focus-visible { outline: none; box-shadow: var(--shadow-focus); border-radius: var(--radius-sm); }
    code { font-family: var(--font-mono); font-size: 0.9em; background: var(--bg-muted); padding: 0.125em 0.375em; border-radius: var(--radius-sm); }
    pre { font-family: var(--font-mono); font-size: var(--text-sm); background: var(--bg-muted); padding: var(--space-4); border-radius: var(--radius-md); overflow-x: auto; line-height: 1.5; }
    pre code { background: transparent; padding: 0; }
    table { width: 100%; border-collapse: collapse; margin: var(--space-4) 0; }
    th, td { text-align: left; padding: var(--space-3); border-bottom: 1px solid var(--border); }
    th { font-weight: 600; font-size: var(--text-sm); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
    button { font-family: inherit; font-size: var(--text-sm); font-weight: 500; padding: var(--space-2) var(--space-4); background: var(--accent); color: white; border: none; border-radius: var(--radius-md); cursor: pointer; transition: var(--transition); }
    button:hover { filter: brightness(1.08); }
    button:focus-visible { outline: none; box-shadow: var(--shadow-focus); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    input, textarea, select { font-family: inherit; font-size: var(--text-base); padding: var(--space-2) var(--space-3); background: var(--bg-elevated); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius-md); transition: var(--transition); }
    input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: var(--shadow-focus); }

    main { max-width: 72ch; margin: 0 auto; padding: var(--space-12) var(--space-6); }
    main.wide { max-width: 100ch; }
    main.full { max-width: 100%; padding: var(--space-8); }
  </style>
</head>
<body>

<main>
  <header>
    <h1>{{TITLE}}</h1>
    <p>{{DESCRIPTION}}</p>
  </header>

  <!-- Conteúdo aqui -->

</main>

<script>
  // JS opcional aqui (sem dependências externas).
</script>
</body>
</html>
